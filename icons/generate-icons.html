<!DOCTYPE html>
<html><head><meta charset="UTF-8"></head>
<body>
<canvas id="c192" width="192" height="192"></canvas>
<canvas id="c512" width="512" height="512"></canvas>
<script>
function draw(canvas) {
  const s = canvas.width;
  const ctx = canvas.getContext('2d');
  // Background gradient
  const bg = ctx.createLinearGradient(0,0,s,s);
  bg.addColorStop(0,'#302b63'); bg.addColorStop(1,'#0f0c29');
  ctx.fillStyle = bg;
  ctx.beginPath(); ctx.roundRect(0,0,s,s,s*0.18); ctx.fill();
  // Mountain
  ctx.fillStyle = '#38ef7d';
  ctx.beginPath();
  ctx.moveTo(s*0.1, s*0.75); ctx.lineTo(s*0.35, s*0.3); ctx.lineTo(s*0.55, s*0.55);
  ctx.lineTo(s*0.65, s*0.4); ctx.lineTo(s*0.9, s*0.75); ctx.closePath(); ctx.fill();
  // Snow cap
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.moveTo(s*0.3, s*0.38); ctx.lineTo(s*0.35, s*0.3); ctx.lineTo(s*0.4, s*0.38); ctx.closePath(); ctx.fill();
  // Plane
  ctx.fillStyle = '#f093fb'; ctx.font = `bold ${s*0.18}px sans-serif`;
  ctx.fillText('\u2708', s*0.55, s*0.3);
  // Pin
  ctx.fillStyle = '#fda085'; ctx.font = `${s*0.12}px sans-serif`;
  ctx.fillText('\uD83D\uDCCD', s*0.15, s*0.65);
}
draw(document.getElementById('c192'));
draw(document.getElementById('c512'));

// Download links
['c192','c512'].forEach(id => {
  const c = document.getElementById(id);
  const a = document.createElement('a');
  a.href = c.toDataURL('image/png');
  a.download = `icon-${c.width}.png`;
  a.textContent = `Download ${c.width}x${c.width}`;
  a.style.cssText = 'display:block;margin:10px;font-size:20px;';
  document.body.appendChild(a);
});
</script>
</body></html>
